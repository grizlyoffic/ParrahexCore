name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Your Forked App
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Clone LSFG Vulkan Core Parallelly
      run: |
        cd ..
        git clone --recursive https://github.com/FrankBarretta/lsfg-vk-android.git lsfg-vk-android

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: LSFG-App-Debug
        path: "**/build/outputs/apk/debug/*.apk"
